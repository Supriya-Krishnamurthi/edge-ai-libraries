name: Video Summarization VLM
definition: >
  Video summarization pipeline using gvagenai with a vision-language model to generate concise scene-level summaries from sampled frames.
tags:
  - genAi
thumbnail: images/video-summary.png
variants:
  - name: CPU
    pipeline_description: >-
      filesrc location=/videos/input/people.mp4 !
      decodebin3 !
      videoconvert !
      video/x-raw,format=RGB !
      gvagenai
        model-path=/models/output/openvino_models/cpu/INT4/google/gemma-3-4b-it
        device=CPU
        prompt="Summarize this video in one sentence."
        generation-config="max_new_tokens=64"
        frame-rate=1
        chunk-size=4
        metrics=false !
      gvafpscounter starting-frame=100 !
      gvametapublish method=file file-format=json-lines file-path=/videos/output/summary.jsonl !
      fakesink sync=false async=false
